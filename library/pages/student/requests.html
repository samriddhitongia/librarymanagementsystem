<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LibraryOS — My Requests</title><link rel="stylesheet" href="../../css/style.css"/></head>
<body>
<div id="topbar" class="topbar"></div>
<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="content">
    <div class="page-head">
      <div class="page-title">My Requests</div>
      <div class="page-sub">Books you've requested when unavailable</div>
    </div>
    <div id="wrap"></div>
  </main>
</div>
<script src="../../js/db.js"></script>
<script>
  const session = requireAuth('student');
  buildTopbar(session);
  buildSidebar('student', 'requests.html');

  async function load() {
    showLoading('wrap');
    try {
      const reqs = await Requests.getAll();
      if (!reqs.length) {
        document.getElementById('wrap').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🔔</div>
            <p>No requests yet.<br>Browse books and tap <strong>Request</strong> when a book is unavailable.</p>
          </div>
          <div style="text-align:center;margin-top:20px">
            <a href="books.html" class="btn btn-accent">Browse Books</a>
          </div>`;
        return;
      }
      document.getElementById('wrap').innerHTML = `
        <div class="table-wrap"><table>
          <thead><tr><th>Book Title</th><th>Author</th><th>Available</th><th>Requested On</th><th>Status</th><th>Admin Remark</th></tr></thead>
          <tbody>${reqs.map(r => `
            <tr>
              <td><strong>${r.book_title}</strong></td>
              <td class="td-muted">${r.author}</td>
              <td style="font-weight:600;color:${r.available_copies > 0 ? 'var(--green)' : 'var(--red)'}">
                ${r.available_copies > 0 ? r.available_copies + ' avail.' : 'None'}
              </td>
              <td class="td-muted">${fmtDate(r.request_date)}</td>
              <td>${badge(r.status)}</td>
              <td class="td-muted">${r.admin_remark || '—'}</td>
            </tr>`).join('')}
          </tbody>
        </table></div>`;
    } catch(err) { showErr('wrap', err.message); }
  }
  load();
</script>
</body>
</html>
